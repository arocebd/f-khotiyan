name: f_khotiyan
description: F-Khotiyan - Business Management App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.5

  # HTTP & API
  http: ^1.6.0
  dio: ^5.9.2

  # Local Storage
  shared_preferences: ^2.5.4
  path_provider: ^2.1.5

  # PDF, Printing & Barcode
  pdf: ^3.11.3
  printing: ^5.14.2
  barcode: ^2.2.9

  # Image & File
  image_picker: ^1.2.1

  # Sharing
  share_plus: ^10.1.4

  # Permissions
  permission_handler: ^11.4.0

  # URL & Phone
  url_launcher: ^6.3.2

  # Localization & Date
  intl: ^0.20.2

  # UI Components
  flutter_svg: ^2.2.4
  google_fonts: ^6.3.3
  cupertino_icons: ^1.0.8

  # Utilities
  uuid: ^4.5.3

  # Ads
  google_mobile_ads: ^5.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/images/splash_logo.png
    - assets/images/app_icon.png
    - assets/images/logo.png

  generate: true
